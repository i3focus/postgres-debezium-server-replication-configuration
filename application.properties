# ====================================================================
# DEBEZIUM SERVER - PostgreSQL Source to PostgreSQL Sink
# Sincronização inicial (snapshot) + CDC contínuo em tempo real
# ====================================================================

# --------------------------------------------------------------------
# SINK (DESTINO) - PostgreSQL
# --------------------------------------------------------------------
debezium.sink.type=jdbc
debezium.sink.jdbc.connection.url=jdbc:postgresql://IP_DO_DESTINO:5432/DESTINO_DB
debezium.sink.jdbc.connection.username=USUARIO_DESTINO
debezium.sink.jdbc.connection.password=SENHA_DESTINO

# upsert: se a PK já existe no destino, atualiza; se não, insere
debezium.sink.jdbc.insert.mode=upsert

# Usa a chave primária do evento (que vem da tabela origem) como PK no destino
debezium.sink.jdbc.primary.key.mode=record_key

# As tabelas já existem no destino, não precisa criar/alterar schema
debezium.sink.jdbc.schema.evolution=none

# Propaga DELETEs da origem para o destino
debezium.sink.jdbc.delete.enabled=true

# Número máximo de tentativas de reconexão JDBC
debezium.sink.jdbc.max.retries=5

# Tempo de espera entre tentativas de reconexão (milissegundos)
debezium.sink.jdbc.retry.interval.ms=10000

# --------------------------------------------------------------------
# SOURCE (ORIGEM) - PostgreSQL
# --------------------------------------------------------------------
debezium.source.connector.class=io.debezium.connector.postgresql.PostgresConnector

# Onde salvar o offset (posição no WAL) — garante que ao reiniciar
# o Debezium retoma de onde parou, sem duplicar dados
debezium.source.offset.storage.file.filename=data/offsets.dat
debezium.source.offset.flush.interval.ms=0

# Conexão com o PostgreSQL de origem
debezium.source.database.hostname=IP_DA_ORIGEM
debezium.source.database.port=5432
debezium.source.database.user=USUARIO_ORIGEM
debezium.source.database.password=SENHA_ORIGEM
debezium.source.database.dbname=ORIGEM_DB

# Prefixo usado no nome dos tópicos (internos) e nas tabelas do destino
# As tabelas no destino serão criadas como: migracao_schema_tabela
debezium.source.topic.prefix=migration

# Transformação para remover o prefixo do nome da tabela no destino
debezium.transforms=dropPrefix
debezium.transforms.dropPrefix.type=org.apache.kafka.connect.transforms.RegexRouter
debezium.transforms.dropPrefix.regex=migration.public.(.*)
debezium.transforms.dropPrefix.replacement=$1


# Plugin nativo do PostgreSQL 10+ para logical decoding (não requer instalação extra)
debezium.source.plugin.name=pgoutput

# Nome do replication slot no PostgreSQL de origem (deve ser único)
debezium.source.slot.name=debezium_slot

# Modo de snapshot:
#   initial = faz scan completo de TODAS as tabelas ANTES de começar CDC
#   garante que origem e destino ficam idênticos antes do streaming
debezium.source.snapshot.mode=initial

# Captura TODAS as tabelas do schema public (não precisa listar uma a uma)
debezium.source.schema.include.list=public

# Cria automaticamente a publicação do PostgreSQL para as tabelas capturadas
## debezium.source.publication.autocreate.mode=all_tables
debezium.source.publication.autocreate.mode=filtered

# Heartbeat: envia evento periódico para manter o replication slot ativo
# quando não há mudanças no banco (evita que o WAL cresça indefinidamente)
debezium.source.heartbeat.interval.ms=60000
debezium.source.heartbeat.topics.regex=.

# Formato de saída: JSON (sem schema Avro, mais simples de debugar)
debezium.format.value=json
debezium.format.key=json

# --------------------------------------------------------------------
# QUARKUS (Runtime do Debezium Server)
# --------------------------------------------------------------------
quarkus.log.console.json=false
